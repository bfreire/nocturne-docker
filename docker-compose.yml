# Nocturne — production stack (Portainer-ready, built from source)
#
# Source upstream:  https://github.com/nightscout/nocturne
# Template based on: src/Web/packages/portal/.../docker-compose/+page.svelte (minimal)
# Aspire orchestration: src/Aspire/Nocturne.Aspire.Host/Program.cs
#
# Services:
#   nocturne-postgres-server  PostgreSQL 17.6 with the three-role init script baked in
#   nocturne-api              .NET REST API (Nightscout-compatible) — built from source
#   nocturne-web              SvelteKit frontend + bot framework — built from source
#   nocturne-watchtower       Watches for image updates (registry-based only)
#
# Build strategy:
#   nocturne-api  — api/Dockerfile (in this repo) clones nightscout/nocturne and
#                   runs dotnet publish; no Dockerfile exists in the upstream.
#   nocturne-web  — Dockerfile.web from the upstream repo, used directly as a
#                   remote Git build context (Docker clones the upstream at build time).
#   nocturne-postgres-server — postgres/Dockerfile (in this repo) bakes in the
#                   three-role init script to avoid Portainer bind-mount issues.
#
# External access goes through Caddy, which reaches the web container at
# 127.0.0.1:${NOCTURNE_WEB_HOST_PORT}. The web container talks to the API
# over the Docker internal network — the API does NOT need external exposure
# for the UI to work.
#
# Portainer:
#   Stacks → Add stack → Repository → set the repo URL → Compose path: docker-compose.yml
#   Environment variables: paste/edit the values from .env.example.

services:
  nocturne-postgres-server:
    # Custom image that bakes in the three-role init script via build context.
    # Avoids the Portainer "Stack from Git" bind-mount trap where ./pg-init
    # resolves to /data/compose/<id>/ inside the Portainer container but not
    # on the Docker host, causing "mkdir /data: read-only file system".
    build:
      context: "./postgres"
      dockerfile: "Dockerfile"
    image: "nocturne-postgres:local"
    container_name: "nocturne-postgres"
    environment:
      POSTGRES_DB: "nocturne"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USERNAME}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      NOCTURNE_MIGRATOR_PASSWORD: "${NOCTURNE_MIGRATOR_PASSWORD}"
      NOCTURNE_APP_PASSWORD: "${NOCTURNE_APP_PASSWORD}"
      NOCTURNE_WEB_PASSWORD: "${NOCTURNE_WEB_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        source: "nocturne-postgres-data"
        target: "/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d nocturne"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - "nocturne"
    restart: "unless-stopped"

  nocturne-api:
    # Built from source: api/Dockerfile clones nightscout/nocturne and runs
    # "dotnet publish". The upstream has no Dockerfile for the API.
    build:
      context: "."
      dockerfile: "api/Dockerfile"
    image: "nocturne-api:local"
    container_name: "nocturne-api"
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      # HTTP only inside the container — TLS is terminated by Caddy.
      HTTP_PORTS: "${NOCTURNE_API_PORT}"
      ConnectionStrings__nocturne-postgres: "Host=nocturne-postgres-server;Port=5432;Username=nocturne_app;Password=${NOCTURNE_APP_PASSWORD};Database=nocturne"
      ConnectionStrings__nocturne-postgres-migrator: "Host=nocturne-postgres-server;Port=5432;Username=nocturne_migrator;Password=${NOCTURNE_MIGRATOR_PASSWORD};Database=nocturne"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      # Used by the API for tenant routing and WebAuthn RP ID resolution.
      # Must match the public domain (without protocol, without port).
      BASE_DOMAIN: "${PUBLIC_BASE_DOMAIN}"
      DemoService__Enabled: "false"
      # Used by the API to dispatch chat-bot alerts to the web container.
      WEB_URL: "http://nocturne-web:${NOCTURNE_WEB_PORT}"
    # No host port published for the API by default — the UI uses Docker DNS
    # to reach it (nocturne-api:${NOCTURNE_API_PORT}). Uncomment if you need
    # Nightscout-compatible clients (uploaders, AndroidAPS, etc.) to talk to
    # the API directly from the internet — then add a Caddy block for it.
    # ports:
    #   - "127.0.0.1:${NOCTURNE_API_HOST_PORT}:${NOCTURNE_API_PORT}"
    expose:
      - "${NOCTURNE_API_PORT}"
    depends_on:
      nocturne-postgres-server:
        condition: "service_healthy"
    networks:
      - "nocturne"
    restart: "unless-stopped"

  nocturne-web:
    # Built from source: upstream Dockerfile.web used as a remote Git build context.
    # Docker clones nightscout/nocturne at build time — no local copy needed.
    build:
      context: "https://github.com/nightscout/nocturne.git#main"
      dockerfile: "Dockerfile.web"
    image: "nocturne-web:local"
    container_name: "nocturne-web"
    environment:
      # SvelteKit listens on this port (overrides the Dockerfile default of 5173).
      PORT: "${NOCTURNE_WEB_PORT}"
      # API URL used SERVER-SIDE by hooks.server.ts and api-client-factory.ts.
      # Uses Docker internal DNS (nocturne-api) — Host header arriving at the API
      # is "nocturne-api:PORT", which TenantResolutionMiddleware cannot match to any
      # tenant, so it falls back to the null tenant (00000000-…) consistently.
      # Setup registers the first user in the null tenant; subsequent auth also
      # resolves the null tenant → they match. BASE_DOMAIN still handles WebAuthn RP ID.
      NOCTURNE_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      PUBLIC_API_URL:   "http://nocturne-api:${NOCTURNE_API_PORT}"
      # Public domain used to build OAuth redirect URLs (Discord, Telegram, …).
      PUBLIC_BASE_DOMAIN: "${PUBLIC_BASE_DOMAIN}"
      # Shared secret with the API for signing JWTs / OAuth state.
      INSTANCE_KEY: "${INSTANCE_KEY}"
      # chat_state_* tables owned by nocturne_web (bot framework state).
      NOCTURNE_POSTGRES_URI: "postgresql://nocturne_web:${NOCTURNE_WEB_PASSWORD}@nocturne-postgres-server:5432/nocturne"
      # Cookie names (kept at upstream defaults; documented here so they're
      # obvious to anyone reading the compose).
      COOKIE_ACCESS_TOKEN_NAME:  ".Nocturne.AccessToken"
      COOKIE_REFRESH_TOKEN_NAME: ".Nocturne.RefreshToken"
      # SvelteKit UI defaults.
      PUBLIC_DEFAULT_LANGUAGE: "en"
      # WebSocket / SignalR client tuning (defaults from upstream Dockerfile.web).
      PUBLIC_WEBSOCKET_RECONNECT_ATTEMPTS:   "5"
      PUBLIC_WEBSOCKET_RECONNECT_DELAY:      "1000"
      PUBLIC_WEBSOCKET_MAX_RECONNECT_DELAY:  "30000"
      PUBLIC_WEBSOCKET_PING_TIMEOUT:         "15000"
      PUBLIC_WEBSOCKET_PING_INTERVAL:        "20000"
      # Optional chat-bot credentials. Leave blank to disable a platform.
      DISCORD_BOT_TOKEN:             "${DISCORD_BOT_TOKEN:-}"
      DISCORD_PUBLIC_KEY:            "${DISCORD_PUBLIC_KEY:-}"
      DISCORD_APPLICATION_ID:        "${DISCORD_APPLICATION_ID:-}"
      DISCORD_CLIENT_SECRET:         "${DISCORD_CLIENT_SECRET:-}"
      TELEGRAM_BOT_TOKEN:            "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}"
      SLACK_BOT_TOKEN:               "${SLACK_BOT_TOKEN:-}"
      SLACK_SIGNING_SECRET:          "${SLACK_SIGNING_SECRET:-}"
      WHATSAPP_ACCESS_TOKEN:         "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_VERIFY_TOKEN:         "${WHATSAPP_VERIFY_TOKEN:-}"
      WHATSAPP_APP_SECRET:           "${WHATSAPP_APP_SECRET:-}"
      WHATSAPP_PHONE_NUMBER_ID:      "${WHATSAPP_PHONE_NUMBER_ID:-}"
    # Published on the host's loopback only — Caddy proxies to here.
    ports:
      - "127.0.0.1:${NOCTURNE_WEB_HOST_PORT}:${NOCTURNE_WEB_PORT}"
    depends_on:
      nocturne-api:
        condition: "service_started"
    networks:
      - "nocturne"
    restart: "unless-stopped"

  watchtower:
    image: "ghcr.io/nicholas-fedor/watchtower:latest"
    container_name: "nocturne-watchtower"
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"          # only update containers with the label above
      WATCHTOWER_POLL_INTERVAL: "86400"         # 24h
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - "nocturne"
    restart: "unless-stopped"

networks:
  nocturne:
    name: "nocturne-net"
    driver: "bridge"

volumes:
  nocturne-postgres-data:
    driver: "local"
